<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashley Wave Trials Web</title>

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(#ff66aa,#ff99cc);
font-family:sans-serif;
}

#game{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
}

/* PLAYER */

.player{
position:absolute;
width:28px;
height:28px;
clip-path:polygon(50% 0%,0% 100%,100% 100%);
background:pink;
box-shadow:0 0 12px white;
}

/* SPIKES */

.spike{
position:absolute;
width:40px;
height:40px;
background:red;
clip-path:polygon(50% 0%,0% 100%,100% 100%);
}

/* PORTALS */

.portal{
position:absolute;
width:40px;
height:40px;
border-radius:50%;
background:cyan;
box-shadow:0 0 15px cyan;
}

/* TRAIL */

.trail{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:white;
opacity:0.7;
pointer-events:none;
}

/* PROGRESS BAR */

#progress{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
width:70%;
height:10px;
background:rgba(255,255,255,0.3);
}

#bar{
height:100%;
width:0%;
background:white;
}

/* DEATH TEXT */

#death{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:40px;
display:none;
}

</style>
</head>

<body>

<div id="game">
<div id="player" class="player"></div>
</div>

<div id="progress"><div id="bar"></div></div>
<div id="death">💀</div>

<script>

const game = document.getElementById("game")
const player = document.getElementById("player")
const bar = document.getElementById("bar")
const deathText = document.getElementById("death")

let y = 250
let holding = false
let speed = 4
let progress = 0
let dead = false

player.style.left = "200px"

document.addEventListener("keydown",e=>{
if(e.code==="Space" || e.key==="w") holding=true
})

document.addEventListener("keyup",()=>holding=false)

document.addEventListener("touchstart",()=>holding=true)
document.addEventListener("touchend",()=>holding=false)

const objects=[]

/* CREATE SPIKES */

function spike(x,y){

const s=document.createElement("div")
s.className="spike"

s.style.left=x+"px"
s.style.bottom=y+"px"

game.appendChild(s)
objects.push(s)

}

/* CREATE PORTAL */

function portal(x,y){

const p=document.createElement("div")
p.className="portal"

p.style.left=x+"px"
p.style.bottom=y+"px"

game.appendChild(p)
objects.push(p)

}

/* LEVEL LAYOUT */

for(let i=0;i<30;i++){

spike(700+i*120,100+i*3)
spike(700+i*120,450-i*3)

}

for(let i=0;i<15;i++){

spike(4300+i*80,120)
spike(4300+i*80,420)

}

portal(2200,250)
portal(4000,250)

/* COLLISION */

function collide(a,b){

const A=a.getBoundingClientRect()
const B=b.getBoundingClientRect()

return !(
A.right<B.left||
A.left>B.right||
A.bottom<B.top||
A.top>B.bottom
)

}

/* DEATH */

function death(){

dead=true
deathText.style.display="block"

setTimeout(()=>{
location.reload()
},1200)

}

/* TRAIL */

function trail(){

const t=document.createElement("div")
t.className="trail"

t.style.left=(player.offsetLeft+10)+"px"
t.style.top=(player.offsetTop+10)+"px"

game.appendChild(t)

setTimeout(()=>t.remove(),250)

}

/* GAME LOOP */

function loop(){

if(dead) return

/* WAVE PHYSICS */

if(holding){

y+=6
player.style.transform="rotate(-35deg)"

}else{

y-=6
player.style.transform="rotate(35deg)"

}

y=Math.max(0,Math.min(window.innerHeight-40,y))
player.style.bottom=y+"px"

/* MOVE LEVEL */

objects.forEach(o=>{

let x=parseFloat(o.style.left)
x-=speed
o.style.left=x+"px"

/* COLLISION */

if(collide(player,o)){

if(o.className==="portal"){

speed+=2
o.remove()

}else{

death()

}

}

})

/* PROGRESS */

progress+=0.03
bar.style.width=progress+"%"

trail()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
