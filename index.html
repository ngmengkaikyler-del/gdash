<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ashley Demon Trials EZ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="gdCanvas"></canvas>
<script type="module">
const wasmUrl = 'https://opstic.github.io/gdclone/gdclone_bg.wasm';
const jsUrl = 'https://opstic.github.io/gdclone/gdclone.js';

async function loadGDClone() {
  const module = await import(jsUrl);
  await module.default(wasmUrl);
  
  const level = await fetch('assets/levels/ashley_wave_trials_e.json').then(r => r.json());
  
  level.objects.forEach(obj => {
    if(obj.type === 'wave') {
      obj.render = function(ctx) {
        const waveHeight = 20;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + waveHeight);            
        ctx.lineTo(this.x + this.length, this.y);          
        ctx.lineTo(this.x + this.length, this.y + waveHeight); 
        ctx.fillStyle = this.color;
        ctx.fill();
      };
    }
  });

  module.load_level(level);
}

loadGDClone();
</script>
</body>
</html>
