<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashley Wave Trials E - GD Clone Style</title>
<style>
/* --- Background --- */
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
  background: linear-gradient(180deg, #ff66aa 0%, #ff99cc 100%);
}

/* --- Game Container --- */
#game-container {
  position: relative;
  width: 100%;
  height: 100vh;
}

/* --- Player --- */
.player {
  position: absolute;
  width: 50px;
  height: 50px;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  background: pink;
  box-shadow: 0 0 8px white;
}

/* --- Hazards --- */
.cog, .spike {
  position: absolute;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  box-shadow: 0 0 8px #fff, 0 3px 6px rgba(0,0,0,0.3);
}

.cog { background: gray; }
.spike {
  background: red;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}

/* --- Portals --- */
.speed-portal, .dual-portal {
  position: absolute;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  box-shadow: 0 0 10px #fff inset, 0 0 8px currentColor;
}

.speed-portal { background-color: cyan; color: cyan; }
.dual-portal { background-color: magenta; color: magenta; }

/* --- Combo Display --- */
.combo-display {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 0 0 5px #fff;
}
</style>
</head>
<body>
<div id="game-container">
  <div id="pink-girl" class="player"></div>

  <!-- Hazards -->
  <div class="cog" style="bottom:120px; left:200px;"></div>
  <div class="spike" style="bottom:60px; left:250px;"></div>
  <div class="cog" style="bottom:80px; left:350px;"></div>
  <div class="spike" style="bottom:100px; left:450px;"></div>

  <!-- Portals -->
  <div class="speed-portal" data-speed="1.5" style="bottom:140px; left:300px;"></div>
  <div class="dual-portal" data-speed="1.8" style="bottom:120px; left:500px;"></div>
</div>

<div class="combo-display" id="combo">Combo: 0</div>

<script>
// --- Variables ---
const pinkGirl = document.getElementById('pink-girl');
const hazards = [...document.querySelectorAll('.cog, .spike')];
const portals = [...document.querySelectorAll('.speed-portal')];
const dualPortals = [...document.querySelectorAll('.dual-portal')];
const comboDisplay = document.getElementById('combo');

pinkGirl.style.left = '100px';
pinkGirl.style.bottom = '100px';
pinkGirl.dataset.y = '100';
[...hazards, ...portals, ...dualPortals].forEach(obj=>obj.baseBottom=parseInt(obj.style.bottom)||0);

let keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);

let pinkSpeed = 3, combo = 0;
let beatInterval = 500, lastBeat = performance.now(), sinePhase = 0;

// --- Functions ---
function isColliding(a,b){
  const A=a.getBoundingClientRect(), B=b.getBoundingClientRect();
  return !(A.right<B.left || A.left>B.right || A.bottom<B.top || A.top>B.bottom);
}

function resetPlayer(player,y){
  player.style.bottom=y+'px';
  combo=0; updateCombo();
}

function highlightPortal(portal){
  portal.style.boxShadow=`0 0 20px ${portal.classList.contains('dual-portal')?'magenta':'cyan'},0 0 10px #fff`;
  setTimeout(()=>portal.style.boxShadow='',100);
}

function checkPortals(player,list){
  list.forEach(p=>{
    if(isColliding(player,p)){
      highlightPortal(p);
      pinkSpeed = Math.min(pinkSpeed * parseFloat(p.dataset.speed), 15);
      combo += 5;
      updateCombo();
    }
  });
}

function updateCombo(){comboDisplay.textContent=`Combo: ${combo}`;}

// --- Game Loop ---
function gameLoop(timestamp){
  if(timestamp - lastBeat >= beatInterval){
    lastBeat = timestamp;
    sinePhase += Math.PI/4;
    hazards.forEach(h=>h.style.bottom = h.baseBottom + 15*Math.sin(sinePhase)+'px');
    portals.forEach(p=>p.style.bottom = p.baseBottom + 10*Math.sin(sinePhase/2)+'px');
    dualPortals.forEach(dp=>dp.style.bottom = dp.baseBottom + 10*Math.sin(sinePhase/2)+'px');
  }

  // Player vertical movement
  let y = parseInt(pinkGirl.dataset.y) + (keys['w'] ? 5 : keys['s'] ? -5 : 0);
  y = Math.max(0, Math.min(window.innerHeight-50, y));
  pinkGirl.dataset.y = y;
  pinkGirl.style.transform = `translate(100px, ${window.innerHeight-50 - y}px)`;

  // Collisions
  hazards.forEach(h=>{if(isColliding(pinkGirl,h)) resetPlayer(pinkGirl,100);});
  checkPortals(pinkGirl, portals);
  dualPortals.forEach(dp=>{if(isColliding(pinkGirl,dp)) pinkSpeed = Math.min(pinkSpeed*parseFloat(dp.dataset.speed),15);});

  combo++;
  updateCombo();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

// --- Mobile Controls ---
function createTouchButton(label,x,y,onPress,onRelease){
  const btn=document.createElement('div');
  btn.textContent=label;
  btn.style.position='fixed';
  btn.style.width='50px';
  btn.style.height='50px';
  btn.style.bottom=y+'px';
  btn.style.left=x+'px';
  btn.style.background='rgba(255,255,255,0.3)';
  btn.style.textAlign='center';
  btn.style.lineHeight='50px';
  btn.style.fontSize='20px';
  btn.style.borderRadius='10px';
  btn.style.userSelect='none';
  btn.style.zIndex='1000';
  btn.addEventListener('touchstart', e=>{e.preventDefault(); onPress();});
  btn.addEventListener('touchend', e=>{e.preventDefault(); onRelease();});
  btn.addEventListener('touchcancel', e=>{e.preventDefault(); onRelease();});
  document.body.appendChild(btn);
}

createTouchButton('↑',20,80,()=>keys['w']=true,()=>keys['w']=false);
createTouchButton('↓',20,20,()=>keys['s']=true,()=>keys['s']=false);
</script>
</body>
</html>
