<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashley Wave Trials E - Enhanced GD Clone</title>
<style>
body { margin:0; background:#111; overflow:hidden; font-family:sans-serif; }
#game-container { position:relative; width:100%; height:100vh; background:#222; }

.player {
  position:absolute; width:50px; height:50px;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  transition: all 0.05s linear;
}

#pink-girl { background:url('assets/pink-girl.png') no-repeat center; background-size:contain; }
#red-version { background:url('assets/red-version.png') no-repeat center; background-size:contain; }

.speed-portal, .dual-portal {
  position:absolute; width:40px; height:40px; border-radius:50%;
}
.speed-portal { background-color:cyan; }
.dual-portal { background-color:magenta; }

.cog { position:absolute; width:60px; height:60px; background:url('assets/cog.png') no-repeat center; background-size:contain; }
.spike { position:absolute; width:40px; height:40px; background:url('assets/spike.png') no-repeat center; background-size:contain; }

.combo-display {
  position:fixed; top:10px; left:50%; transform:translateX(-50%);
  color:white; font-size:24px; font-weight:bold;
}
</style>
</head>
<body>
<div id="game-container">
  <div id="pink-girl" class="player"></div>
  <div id="red-version" class="player"></div>

  <!-- Example hazards/portals (keep graphics) -->
  <div class="speed-portal" data-speed="1.5" style="bottom:200px; left:350px;"></div>
  <div class="dual-portal" data-speed="1.8" style="bottom:220px; left:500px;"></div>
  <div class="cog" style="bottom:150px; left:400px;"></div>
  <div class="spike" style="bottom:0px; left:300px;"></div>
</div>

<div class="combo-display" id="combo">Combo: 0</div>

<script>
// === Players and objects ===
const pinkGirl = document.getElementById('pink-girl');
const redVersion = document.getElementById('red-version');
let hazards = [...document.querySelectorAll('.cog, .spike')];
let portals = [...document.querySelectorAll('.speed-portal')];
let dualPortals = [...document.querySelectorAll('.dual-portal')];
const comboDisplay = document.getElementById('combo');

// === Input ===
let keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);

let pinkDirection = 0, redDirection = 0;
let pinkSpeed = 3, redSpeed = 3;
let combo = 0;

// === Beat / rhythm ===
let beatInterval = 500; // ms per beat
let lastBeat = performance.now();

// === Collision detection ===
function isColliding(a, b) {
  const A = a.getBoundingClientRect();
  const B = b.getBoundingClientRect();
  return !(A.right < B.left || A.left > B.right || A.bottom < B.top || A.top > B.bottom);
}

// === Reset player on hazard ===
function resetPlayer(player, x, y) {
  player.style.left = x + 'px';
  player.style.bottom = y + 'px';
  if(player === pinkGirl) pinkSpeed = 3;
  if(player === redVersion) redSpeed = 3;
  combo = 0;
  updateCombo();
}

// === Portals ===
function checkPortals(player, list) {
  list.forEach(p => {
    if (isColliding(player, p)) {
      if (player === pinkGirl) pinkSpeed *= parseFloat(p.dataset.speed);
      if (player === redVersion) redSpeed *= parseFloat(p.dataset.speed);
    }
  });
}

// === Update combo display ===
function updateCombo() {
  comboDisplay.textContent = `Combo: ${combo}`;
}

// === Game loop ===
function gameLoop(timestamp) {
  // === Beat logic ===
  if(timestamp - lastBeat >= beatInterval) {
    lastBeat = timestamp;
    hazards.forEach(h => {
      // rhythm movement: slight up-down motion
      h.style.bottom = (parseInt(h.style.bottom) || 0) + (Math.random() < 0.5 ? 10 : -10) + 'px';
    });
    // gradually increase speed
    pinkSpeed += 0.02;
    redSpeed += 0.02;
  }

  // === Input ===
  pinkDirection = 0;
  redDirection = 0;
  if(keys['w']) pinkDirection = 1;
  if(keys['s']) pinkDirection = -1;
  if(keys['ArrowUp']) redDirection = 1;
  if(keys['ArrowDown']) redDirection = -1;

  // === Move players ===
  pinkGirl.style.bottom = Math.max(0, Math.min(window.innerHeight-50,
    parseInt(pinkGirl.style.bottom) + pinkDirection * 5)) + 'px';
  pinkGirl.style.left = Math.min(window.innerWidth-50,
    parseInt(pinkGirl.style.left) + pinkSpeed) + 'px';

  redVersion.style.bottom = Math.max(0, Math.min(window.innerHeight-50,
    parseInt(redVersion.style.bottom) + redDirection * 5)) + 'px';
  redVersion.style.left = Math.min(window.innerWidth-50,
    parseInt(redVersion.style.left) + redSpeed) + 'px';

  // === Hazards ===
  hazards.forEach(h => {
    if(isColliding(pinkGirl,h)) resetPlayer(pinkGirl,100,100);
    if(isColliding(redVersion,h)) resetPlayer(redVersion,200,100);
  });

  // === Portals ===
  checkPortals(pinkGirl, portals);
  checkPortals(redVersion, portals);
  dualPortals.forEach(dp => {
    if(isColliding(pinkGirl,dp) || isColliding(redVersion,dp)) {
      pinkSpeed *= parseFloat(dp.dataset.speed);
      redSpeed *= parseFloat(dp.dataset.speed);
    }
  });

  // === Increment combo for survival ===
  combo++;
  updateCombo();

  requestAnimationFrame(gameLoop);
}

// === Mobile touch buttons ===
function createTouchButton(label, x, y, callbackDown, callbackUp) {
  const btn = document.createElement('div');
  btn.textContent = label;
  btn.style.position = 'fixed';
  btn.style.width = '50px';
  btn.style.height = '50px';
  btn.style.bottom = y + 'px';
  btn.style.left = x + 'px';
  btn.style.background = 'rgba(255,255,255,0.3)';
  btn.style.textAlign = 'center';
  btn.style.lineHeight = '50px';
  btn.style.fontSize = '20px';
  btn.style.borderRadius = '10px';
  btn.style.userSelect = 'none';
  btn.addEventListener('touchstart', e => { e.preventDefault(); callbackDown(); });
  btn.addEventListener('touchend', e => { e.preventDefault(); callbackUp(); });
  document.body.appendChild(btn);
}

// Pink Girl Up/Down
createTouchButton('↑', 20, 80, () => pinkDirection = 1, () => pinkDirection = 0);
createTouchButton('↓', 20, 20, () => pinkDirection = -1, () => pinkDirection = 0);

// Red Version Up/Down
createTouchButton('↑', window.innerWidth - 70, 80, () => redDirection = 1, () => redDirection = 0);
createTouchButton('↓', window.innerWidth - 70, 20, () => redDirection = -1, () => redDirection = 0);

// === Initialize ===
pinkGirl.style.bottom = '100px'; pinkGirl.style.left = '100px';
redVersion.style.bottom = '100px'; redVersion.style.left = '200px';
gameLoop(performance.now());
</script>
</body>
</html>
