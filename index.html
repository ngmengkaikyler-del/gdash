<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ashley Wave Trials HTML</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

canvas{
display:block;
}

#progress{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
width:70%;
height:10px;
background:rgba(255,255,255,0.2);
}

#bar{
height:100%;
width:0%;
background:white;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="progress"><div id="bar"></div></div>

<script>

/* CANVAS */

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const bar=document.getElementById("bar")

/* INPUT */

let holding=false

document.addEventListener("keydown",()=>holding=true)
document.addEventListener("keyup",()=>holding=false)

document.addEventListener("touchstart",()=>holding=true)
document.addEventListener("touchend",()=>holding=false)

/* PLAYER */

let player={
x:200,
y:350
}

let speed=6
let wavePower=6

/* OBJECT LISTS */

let spikesTop=[]
let spikesBottom=[]
let portals=[]
let saws=[]
let trail=[]

/* TRAIL */

function addTrail(x,y){

trail.push({
x:x,
y:y,
life:25
})

}

/* SPIKE GENERATOR */

function ashleyTunnel(startX,length,gap,amp,spd){

for(let i=0;i<length;i++){

let x=startX+i*22

let center=
350+
Math.sin(i*spd)*amp+
Math.sin(i*0.05)*60

spikesTop.push({
x:x,
y:center-gap
})

spikesBottom.push({
x:x,
y:center+gap
})

}

}

/* LEVEL */

function generateLevel(){

ashleyTunnel(800,400,90,120,0.4)

portals.push({x:10000,speed:10})

ashleyTunnel(10200,500,70,150,0.6)

portals.push({x:20000,speed:14})

ashleyTunnel(20200,700,60,170,0.8)

portals.push({x:34000,speed:18})

ashleyTunnel(34200,900,55,200,1.1)

portals.push({x:52000,speed:22})

ashleyTunnel(52200,1200,45,220,1.3)

}

generateLevel()

/* COLLISION */

function hit(px,py,ox,oy){

return(
px<ox+30 &&
px+20>ox &&
py<oy+30 &&
py+20>oy
)

}

/* UPDATE */

function update(){

if(holding){
player.y+=wavePower
}else{
player.y-=wavePower
}

player.x+=speed

addTrail(player.x,player.y)

/* portals */

portals.forEach(p=>{
if(hit(player.x,player.y,p.x,350)){
speed=p.speed
}
})

/* spikes */

spikesTop.forEach(s=>{
if(hit(player.x,player.y,s.x,s.y)) death()
})

spikesBottom.forEach(s=>{
if(hit(player.x,player.y,s.x,s.y)) death()
})

/* progress */

let progress=(player.x/65000)*100
bar.style.width=progress+"%"

}

/* DEATH */

function death(){

player.x=200
player.y=350
speed=6
trail=[]

}

/* BACKGROUND */

let scroll=0

function drawBG(){

scroll+=speed*0.2

let grad=ctx.createLinearGradient(0,0,0,canvas.height)

grad.addColorStop(0,"#ff3aa5")
grad.addColorStop(1,"#ff8be0")

ctx.fillStyle=grad
ctx.fillRect(0,0,canvas.width,canvas.height)

/* stars */

ctx.fillStyle="rgba(255,255,255,0.2)"

for(let i=0;i<80;i++){

let x=(i*200-scroll)%canvas.width
let y=(i*97)%canvas.height

ctx.fillRect(x,y,2,2)

}

}

/* SPIKES */

function drawSpikes(){

ctx.shadowBlur=35
ctx.shadowColor="#ff2ea3"

ctx.fillStyle="#ff2ea3"

spikesTop.forEach(s=>{

let x=s.x-player.x+200

ctx.beginPath()
ctx.moveTo(x,s.y)
ctx.lineTo(x+20,s.y+40)
ctx.lineTo(x-20,s.y+40)
ctx.fill()

})

spikesBottom.forEach(s=>{

let x=s.x-player.x+200

ctx.beginPath()
ctx.moveTo(x,s.y+40)
ctx.lineTo(x+20,s.y)
ctx.lineTo(x-20,s.y)
ctx.fill()

})

ctx.shadowBlur=0

}

/* PORTALS */

function drawPortals(){

ctx.shadowBlur=30
ctx.shadowColor="#ff9ae8"

ctx.fillStyle="#ff9ae8"

portals.forEach(p=>{

let x=p.x-player.x+200

ctx.beginPath()
ctx.arc(x,350,22,0,Math.PI*2)
ctx.fill()

})

ctx.shadowBlur=0

}

/* TRAIL */

function drawTrail(){

ctx.fillStyle="white"

trail.forEach(t=>{

ctx.globalAlpha=t.life/25

ctx.fillRect(
t.x-player.x+200,
t.y,
4,
4
)

})

ctx.globalAlpha=1

}

/* PLAYER */

function drawPlayer(){

ctx.shadowBlur=20
ctx.shadowColor="white"

ctx.fillStyle="white"

ctx.save()

ctx.translate(200,player.y)

ctx.rotate(holding?-0.6:0.6)

ctx.beginPath()
ctx.moveTo(-12,-10)
ctx.lineTo(12,0)
ctx.lineTo(-12,10)
ctx.fill()

ctx.restore()

ctx.shadowBlur=0

}

/* ASHLEY DECOR */

function drawAshley(){

ctx.globalAlpha=0.2
ctx.fillStyle="#ffc1ea"

ctx.beginPath()
ctx.arc(120,200,70,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(100,180,12,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(140,180,12,0,Math.PI*2)
ctx.fill()

ctx.globalAlpha=1

}

/* DRAW */

function draw(){

drawBG()
drawAshley()
drawSpikes()
drawPortals()
drawTrail()
drawPlayer()

}

/* LOOP */

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
