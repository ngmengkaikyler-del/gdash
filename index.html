<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashley Wave Trials Easy</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(180deg,#ff5fa2,#ff99cc);
animation:bgpulse 6s infinite alternate;
}

@keyframes bgpulse{
from{filter:brightness(1)}
to{filter:brightness(1.2)}
}

#game{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
}

/* PLAYER */

.player{
position:absolute;
width:26px;
height:26px;
background:white;
clip-path:polygon(0% 50%,100% 0%,100% 100%);
box-shadow:0 0 12px white;
}

/* SPIKES */

.spike{
position:absolute;
width:40px;
height:40px;
background:#ff2e6e;
clip-path:polygon(50% 0%,0% 100%,100% 100%);
box-shadow:0 0 15px #ff2e6e;
}

/* SAWS */

.saw{
position:absolute;
width:40px;
height:40px;
border-radius:50%;
background:white;
box-shadow:0 0 15px white;
}

/* PORTALS */

.portal{
position:absolute;
width:45px;
height:45px;
border-radius:50%;
background:cyan;
box-shadow:0 0 18px cyan;
}

/* TRAIL */

.trail{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:white;
opacity:0.8;
pointer-events:none;
}

/* PROGRESS BAR */

#progress{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
width:70%;
height:10px;
background:rgba(255,255,255,0.3);
}

#bar{
height:100%;
width:0%;
background:white;
}

/* TEXT */

#death,#complete{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:40px;
display:none;

}

</style>
</head>

<body>

<div id="game">
<div id="player" class="player"></div>
</div>

<div id="progress"><div id="bar"></div></div>

<div id="death">💀</div>
<div id="complete">LEVEL COMPLETE 🎉</div>

<script>

const game=document.getElementById("game")
const player=document.getElementById("player")
const bar=document.getElementById("bar")
const deathText=document.getElementById("death")
const completeText=document.getElementById("complete")

let y=250
let holding=false
let speed=3
let progress=0
let dead=false
let mini=false

player.style.left="200px"

document.addEventListener("keydown",e=>{
if(e.code==="Space"||e.key==="w")holding=true
})

document.addEventListener("keyup",()=>holding=false)

document.addEventListener("touchstart",()=>holding=true)
document.addEventListener("touchend",()=>holding=false)

const objects=[]

function spike(x,y){

const s=document.createElement("div")
s.className="spike"
s.style.left=x+"px"
s.style.bottom=y+"px"

game.appendChild(s)
objects.push(s)

}

function portal(x,y){

const p=document.createElement("div")
p.className="portal"
p.style.left=x+"px"
p.style.bottom=y+"px"

game.appendChild(p)
objects.push(p)

}

/* EASY ASHLEY WAVE TRIALS STYLE */

/* INTRO */

for(let i=0;i<20;i++){

spike(800+i*170,180+i*2)
spike(800+i*170,360-i*2)

}

/* ZIG ZAG */

for(let i=0;i<14;i++){

let offset=(i%2==0)?70:0

spike(4200+i*150,200+offset)
spike(4200+i*150,330-offset)

}

/* SPEED PORTAL */

portal(6300,250)

/* MID SECTION */

for(let i=0;i<18;i++){

spike(6600+i*140,200)
spike(6600+i*140,330)

}

/* MINI WAVE */

portal(9000,250)

for(let i=0;i<16;i++){

let offset=(i%2==0)?50:0

spike(9400+i*130,210+offset)
spike(9400+i*130,320-offset)

}

/* FINAL */

for(let i=0;i<16;i++){

spike(12000+i*140,210)
spike(12000+i*140,320)

}

/* COLLISION */

function collide(a,b){

const A=a.getBoundingClientRect()
const B=b.getBoundingClientRect()

return !(A.right<B.left||A.left>B.right||A.bottom<B.top||A.top>B.bottom)

}

/* DEATH */

function death(){

dead=true
deathText.style.display="block"

setTimeout(()=>location.reload(),1200)

}

/* COMPLETE */

function complete(){

dead=true
completeText.style.display="block"

}

/* TRAIL */

function trail(){

const t=document.createElement("div")
t.className="trail"

t.style.left=(player.offsetLeft+12)+"px"
t.style.top=(player.offsetTop+12)+"px"

game.appendChild(t)

setTimeout(()=>t.remove(),200)

}

/* GAME LOOP */

function loop(){

if(dead)return

let wavePower=mini?4:5

if(holding){

y+=wavePower
player.style.transform="rotate(-35deg)"

}else{

y-=wavePower
player.style.transform="rotate(35deg)"

}

y=Math.max(0,Math.min(window.innerHeight-40,y))
player.style.bottom=y+"px"

/* MOVE OBJECTS */

objects.forEach(o=>{

let x=parseFloat(o.style.left)

x-=speed
o.style.left=x+"px"

if(collide(player,o)){

if(o.className==="portal"){

if(!mini){

mini=true
player.style.transform+=" scale(0.7)"

}else{

speed+=1

}

o.remove()

}else{

death()

}

}

})

progress+=0.03
bar.style.width=progress+"%"

if(progress>=100)complete()

trail()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
