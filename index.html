<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ashley Demon Trials EZ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="gdCanvas"></canvas>
<script type="module">
const wasmUrl = 'https://opstic.github.io/gdclone/gdclone_bg.wasm';
const jsUrl = 'https://opstic.github.io/gdclone/gdclone.js';

async function loadGDClone() {
  // Dynamically import the GDClone JS loader
  const module = await import(jsUrl);
  // Initialize with the remote WASM file
  await module.default(wasmUrl);
  // Load your custom level JSON
  module.load_level('assets/levels/ashley_wave_trials_e.json');
}

loadGDClone();
</script>
</body>
</html>
